name: Daily Europe Job Search

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *" # 08:00 IST

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - run: cp config/config.example.yaml config/config.yaml
      - run: python -m jobbot discover --config config/config.yaml
      - run: python -m jobbot package --config config/config.yaml --min-score 70
      - uses: actions/upload-artifact@v4
        with:
          name: application-packages
          path: |
            out/
            data/jobs.sqlite
